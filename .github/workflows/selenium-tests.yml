name: Selenium Automation Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  run-selenium-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install System Dependencies for Headless Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
        pip install pytest-html pytest-json-report

    - name: Setup Database
      run: |
        python -c "from backend.app import app, db; app.app_context().push(); db.create_all()"

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Start Services
      run: |
        # Start Flask Backend
        python backend/app.py &
        
        # Start Vite Frontend
        cd frontend && npm run dev &
        
        # Wait for services to boot up
        sleep 10
      env:
        FLASK_APP: backend/app.py
        FLASK_ENV: testing

    - name: Run All Selenium Tests
      run: |
        echo "Running Full Selenium E2E Suite"
        pytest tests/ -v --html=tests/report.html --self-contained-html --json-report --json-report-file=report.json
      env:
        CI: true

    - name: Upload Test Report (HTML)
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: html-test-report
        path: tests/report.html

    - name: Upload JSON Report
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: json-test-report
        path: report.json

    - name: Upload Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v3
      with:
        name: test-screenshots
        path: "*.png"
