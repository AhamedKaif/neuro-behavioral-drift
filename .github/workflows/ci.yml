name: CI Pipeline

permissions:
  contents: write

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  api-and-validation-tests:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest

    - name: Setup Database
      working-directory: ./backend
      run: python db.py

    - name: Run Validation Checks (Linting)
      run: |
        pip install flake8
        flake8 backend/ frontend/src/ --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Linting passed with warnings"

    - name: Run API Tests (Dry Run)
      run: |
        # API Tests run without browser UI interaction
        echo "Validating API endpoints..."
        python -m pytest backend/test_app.py -v --disable-warnings
      env:
        CI: true

  selenium-automation-tests:
    needs: api-and-validation-tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install System Dependencies for Headless Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable xvfb

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install selenium webdriver-manager pytest pytest-html openpyxl pytest-json-report junitparser

    - name: Setup Database
      working-directory: ./backend
      run: python db.py

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Start Services
      run: |
        (cd backend && python app.py &)
        (cd frontend && npm run dev &)
        
        echo "Waiting for Backend on port 5000..."
        while ! curl -s http://127.0.0.1:5000 > /dev/null; do sleep 1; done
        
        echo "Waiting for Frontend on port 5173..."
        while ! curl -s http://127.0.0.1:5173 > /dev/null; do sleep 1; done
        echo "Services started successfully!"
      env:
        FLASK_APP: backend/app.py
        FLASK_ENV: testing

    - name: Setup Test Environment
      run: |
        mkdir -p reports
        mkdir -p reports/screenshots
        mkdir -p reports/logs

    - name: Run E2E Test Suite and Generate Reports
      id: run-tests-step
      continue-on-error: true
      run: |
        python run_tests.py
      env:
        CI: true

    - name: Publish Test Dashboard to Step Summary
      if: always()
      run: |
        junitparser merge reports/junit_*.xml reports/junit_report.xml || echo "Failed to merge XML"
        if [ -f reports/report.json ]; then
          total=$(jq '.summary.total // 0' reports/report.json)
          passed=$(jq '.summary.passed // 0' reports/report.json)
          failed=$(jq '.summary.failed // 0' reports/report.json)
          percentage=$(( passed * 100 / total ))
          echo "::notice title=Workflow Summary::Total Workflows Executed: $total, Total Passed: $passed, Total Failed: $failed, Pass Percentage: ${percentage}%"
        fi
        if [ -f reports/test_verification_dashboard.md ]; then
          cat reports/test_verification_dashboard.md >> $GITHUB_STEP_SUMMARY
        fi
      env:
        CI: true

    - name: Commit and Push Selenium Report
      if: always()
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
          echo "Pull request is from a fork. Skipping push."
          exit 0
        fi

        TARGET_BRANCH="${{ github.head_ref }}"
        if [ -z "$TARGET_BRANCH" ]; then
          TARGET_BRANCH="${{ github.ref_name }}"
        fi

        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        git fetch origin "$TARGET_BRANCH"
        git checkout "$TARGET_BRANCH" || git checkout -b "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
        git reset --hard "origin/$TARGET_BRANCH"
        git clean -fd -e reports/
        git add reports/
        git diff --cached --quiet || git commit -m "Update Selenium test reports [skip ci]"
        git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
        git push origin HEAD:"$TARGET_BRANCH"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Test Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: reports/

    - name: Upload Screenshots on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: failure-screenshots
        path: reports/screenshots/
        if-no-files-found: ignore

    - name: Fail Build if Tests Failed
      if: always()
      run: |
        if [ "${{ steps.run-tests-step.outcome }}" = "failure" ]; then
          echo "Selenium E2E Test Suite had failures. Failing the workflow run."
          exit 1
        fi
